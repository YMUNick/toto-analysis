name: Deploy to GitHub Pages

on:
  # 爬蟲 workflow 完成後自動觸發（GITHUB_TOKEN push 不會觸發 push event）
  workflow_run:
    workflows: ["🎱 TOTO Scraper"]
    types: [completed]
    branches: [master]

  # 手動觸發 / workflow 檔案本身更新時
  push:
    branches: [master]
    paths:
      - "toto-analysis/docs/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docs folder
        run: |
          cp toto-analysis/data/results.json toto-analysis/docs/data/results.json
          cp toto-analysis/data/meta.json    toto-analysis/docs/data/meta.json
          echo "Data files copied to docs/"
          ls -lh toto-analysis/docs/data/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: toto-analysis/docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
