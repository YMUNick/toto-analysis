name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "toto-analysis/data/**"
      - "toto-analysis/docs/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docs folder
        run: |
          cp toto-analysis/data/results.json toto-analysis/docs/data/results.json
          cp toto-analysis/data/meta.json    toto-analysis/docs/data/meta.json
          echo "Data files copied to docs/"
          ls -lh toto-analysis/docs/data/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: toto-analysis/docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
