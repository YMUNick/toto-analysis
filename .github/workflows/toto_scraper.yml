name: 🎱 TOTO Scraper

on:
  workflow_dispatch:
    inputs:
      full_scrape:
        description: "是否全量重新爬取"
        required: false
        default: "false"

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r toto-analysis/scraper/requirements.txt

      - name: Run scraper
        run: |
          echo "Running TOTO scraper..."
          python toto-analysis/scraper/scraper.py

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add toto-analysis/data/results.json toto-analysis/data/meta.json
          git diff --staged --quiet || git commit -m "🎱 Update TOTO data [skip ci]"
          git push