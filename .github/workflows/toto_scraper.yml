name: 🎱 TOTO Scraper

on:
  schedule:
    - cron: "30 14 * * 1"   # Monday 14:30 UTC
    - cron: "30 14 * * 4"   # Thursday 14:30 UTC

  workflow_dispatch:
    inputs:
      full_scrape:
        description: "Full refresh from 2015 (re-fetch all historical data)"
        required: false
        default: "false"

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r toto-analysis/scraper/requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: |
          if [ "${{ github.event.inputs.full_scrape }}" = "true" ]; then
            echo "Running full refresh..."
            python toto-analysis/scraper/scraper.py --full
          else
            echo "Running incremental update..."
            python toto-analysis/scraper/scraper.py
          fi

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add toto-analysis/data/results.json toto-analysis/data/meta.json
          git diff --staged --quiet || git commit -m "🎱 Update TOTO data"
          git push
