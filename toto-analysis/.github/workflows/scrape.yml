name: 🎱 TOTO Scraper

on:
  schedule:
    - cron: "30 14 * * 1"
    - cron: "30 14 * * 4"

  workflow_dispatch:
    inputs:
      full_refresh:
        description: "全量重新爬取（首次部署請勾選）"
        required: false
        default: "false"
        type: boolean

  push:
    branches: [main]
    paths:
      - "scraper/**"
      - ".github/workflows/scrape.yml"

jobs:
  scrape:
    name: Scrape & Update Data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 診斷：顯示 repo 實際結構 ──
      - name: 🔎 Show repo structure
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== root files ==="
          ls -la
          echo "=== scraper/ ==="
          ls -la scraper/ 2>/dev/null || echo "WARNING: scraper/ not found"
          echo "=== data/ ==="
          ls -la data/ 2>/dev/null || echo "WARNING: data/ not found"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: 📦 Install dependencies
        run: pip install -r scraper/requirements.txt

      # ── 確保 data/ 目錄與初始檔案存在 ──
      - name: 📁 Ensure data directory
        run: |
          mkdir -p data
          [ -f data/results.json ] || echo "[]" > data/results.json
          [ -f data/meta.json ]    || echo "{}" > data/meta.json

      - name: 🕷️ Run scraper
        env:
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
        run: |
          if [ ! -f scraper/scraper.py ]; then
            echo "ERROR: scraper/scraper.py not found. All .py files:"
            find . -name "*.py" 2>/dev/null
            exit 1
          fi
          if [ "$FULL_REFRESH" = "true" ]; then
            python scraper/scraper.py --full
          else
            python scraper/scraper.py
          fi

      - name: 🔍 Check for changes
        id: check_changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 💾 Commit & push data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          LATEST=$(python3 -c "
          import json, pathlib
          f = pathlib.Path('data/meta.json')
          if f.exists():
              m = json.loads(f.read_text())
              draw = m.get('latest_draw','?')
              date = m.get('latest_date','?')
              print(f'#{draw} ({date})')
          else:
              print('unknown')
          ")
          git add data/results.json data/meta.json
          git commit -m "🎱 自動更新 TOTO 資料 · 最新期 $LATEST [skip ci]"
          git push

      - name: ℹ️ No new data
        if: steps.check_changes.outputs.changed != 'true'
        run: echo "資料已是最新，無需更新。"

      - name: 📋 Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-${{ github.run_number }}
          path: data/meta.json
          retention-days: 7
